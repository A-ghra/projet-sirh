<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - OTOMIA RH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="logo-box">
                    <i class="fas fa-building"></i>
                    <div>
                        <h1>OTOMIA RH</h1>
                        <p>Système Intelligent de Gestion des Ressources Humaines</p>
                    </div>
                </div>
            </div>
            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Nom d'utilisateur ou Email</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="Saisissez votre identifiant">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Mot de passe</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Saisissez votre mot de passe">
                </div>
                <div id="api-status" class="error-message" hidden style="background:#fff3cd;color:#856404;border:1px solid #ffc107"></div>
                <div id="login-error" class="error-message" hidden></div>
                <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </button>
                <p class="login-forgot">
                    <a href="#" id="forgot-password-link">Mot de passe oublié ?</a>
                </p>
            </form>
            <div class="login-developer-signature otomia-developer-signature" data-format="login">
                Conçu et développé par OTOMIA GROUP &copy; 2026
            </div>
        </div>
    </div>
    <script src="js/config.js?v=20260621"></script>
    <script src="js/branding.js"></script>
    <script src="js/auth.js?v=20260621"></script>
</body>
</html>
